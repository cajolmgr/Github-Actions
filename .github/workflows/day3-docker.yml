name: Day 3 - Docker build & push

on:
  push:
    paths:
      - "day3-docker-app/**"
      - ".github/workflows/day3-docker.yml"
  pull_request:
    paths:
      - "day3-docker-app/**"
  workflow_dispatch:

# Least privilege: this job only needs to read code and write packages (GHCR).
permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Run tests before we build anything
        working-directory: day3-docker-app
        run: node --test

      - name: Set up Buildx
        # Buildx unlocks advanced build features, including layer caching.
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        # No secret to create: GITHUB_TOKEN is provided automatically and,
        # with packages:write above, it can push to *this* repo's registry.
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/day3-app
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: day3-docker-app
          # Only actually push on a real branch push, not on pull_request
          # (PRs from forks can't write packages anyway).
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs using GitHub's Actions cache backend.
          cache-from: type=gha
          cache-to: type=gha,mode=max
 